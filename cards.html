<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINGO - Print Cards</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #2980b9;
    --red: #c0392b;
    --purple: #8e44ad;
    --green: #27ae60;
    --orange: #e67e22;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #1a1a2e;
    color: #ecf0f1;
    min-height: 100vh;
  }

  /* ── CONTROLS (hidden when printing) ── */
  .controls {
    padding: 24px 32px;
    background: #16213e;
    border-bottom: 2px solid #e94560;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .controls h1 {
    font-size: 1.4rem;
    color: #f5c518;
    letter-spacing: 4px;
    margin-right: 12px;
  }
  .controls label {
    font-size: 0.9rem;
    color: #7f8c8d;
  }
  .controls select, .controls input[type="number"] {
    background: #1a1a2e;
    color: #ecf0f1;
    border: 1px solid #7f8c8d;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 1rem;
  }
  .controls input[type="number"] { width: 80px; }
  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn:hover { transform: translateY(-1px); filter: brightness(1.15); }
  .btn-primary { background: #27ae60; color: #fff; }
  .btn-print { background: #2980b9; color: #fff; }
  .btn-back { background: #7f8c8d; color: #fff; text-decoration: none; display: inline-block; }

  /* ── CARD GRID (screen) ── */
  .cards-container {
    padding: 24px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
  }

  /* ── SINGLE CARD ── */
  .bingo-card {
    border: 3px solid #333;
    border-radius: 10px;
    overflow: hidden;
    background: #fff;
    color: #111;
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .card-title {
    text-align: center;
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: 8px;
    padding: 8px 0 4px;
    background: #111;
    color: #fff;
  }
  .card-id {
    text-align: center;
    font-size: 0.65rem;
    color: #999;
    padding: 0 0 4px;
    background: #111;
  }

  /* 75-ball card */
  .card-grid-75 {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
  }
  .card-grid-75 .card-header {
    padding: 6px 0;
    text-align: center;
    font-size: 1.3rem;
    font-weight: 900;
    color: #fff;
  }
  .card-grid-75 .card-header.h-b { background: var(--blue); }
  .card-grid-75 .card-header.h-i { background: var(--red); }
  .card-grid-75 .card-header.h-n { background: var(--purple); }
  .card-grid-75 .card-header.h-g { background: var(--green); }
  .card-grid-75 .card-header.h-o { background: var(--orange); }

  .card-cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    font-weight: 700;
    border: 1px solid #ddd;
  }
  .card-cell.free {
    font-size: 0.75rem;
    font-weight: 900;
    color: #888;
    text-transform: uppercase;
  }

  /* 90-ball card */
  .card-grid-90 {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
  }
  .card-grid-90 .card-cell {
    aspect-ratio: unset;
    height: 40px;
    font-size: 1.2rem;
  }
  .card-grid-90 .card-cell.blank {
    background: #f0f0f0;
  }

  /* ── PRINT STYLES ── */
  @media print {
    @page {
      size: A4 portrait;
      margin: 10mm;
    }
    body {
      background: #fff;
      color: #000;
    }
    .controls { display: none !important; }

    /* 75-ball: 2 per row */
    .cards-container.type-75 {
      padding: 0;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    /* 90-ball: 1 per row, 4 per page */
    .cards-container.type-90 {
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .cards-container.type-90 .bingo-card {
      width: 100%;
    }
    .cards-container.type-90 .bingo-card:nth-child(4n) {
      page-break-after: always;
    }
    .cards-container.type-90 .card-grid-90 .card-cell {
      height: 60px;
      font-size: 1.8rem;
    }
    .cards-container.type-90 .card-title {
      font-size: 1.8rem;
      padding: 10px 0 6px;
    }

    .bingo-card {
      border: 2px solid #000;
      border-radius: 4px;
    }
    .card-title { font-size: 1.4rem; }
    .card-cell { font-size: 1.2rem; border-color: #999; }
  }
</style>
</head>
<body>

<div class="controls">
  <a href="index.html" class="btn btn-back">Back</a>
  <h1>BINGO CARDS</h1>
  <div>
    <label>Game type:</label>
    <select id="gameType">
      <option value="75">75 Ball (B-I-N-G-O)</option>
      <option value="90">90 Ball (UK Style)</option>
    </select>
  </div>
  <div>
    <label>Number of cards:</label>
    <input type="number" id="cardCount" value="6" min="1" max="60">
  </div>
  <button class="btn btn-primary" id="generateBtn">Generate</button>
  <button class="btn btn-print" id="printBtn">Print</button>
</div>

<div class="cards-container" id="cardsContainer"></div>

<script>
// ══════════════════════════════════════════
// 75-BALL CARD GENERATION
// ══════════════════════════════════════════
function generate75Card() {
  // Each column: B=1-15, I=16-30, N=31-45, G=46-60, O=61-75
  // Pick 5 random from each column (N column has 4 + free space)
  const ranges = [[1,15],[16,30],[31,45],[46,60],[61,75]];
  const columns = ranges.map(([lo, hi]) => {
    const pool = [];
    for (let i = lo; i <= hi; i++) pool.push(i);
    shuffle(pool);
    return pool.slice(0, 5);
  });
  // Center cell (N column, row 2) is free
  return columns; // 5 arrays of 5 numbers each
}

function render75Card(columns, id) {
  const card = document.createElement('div');
  card.className = 'bingo-card';

  card.innerHTML = `
    <div class="card-title">B I N G O</div>
    <div class="card-id">Card #${id}</div>
  `;

  const grid = document.createElement('div');
  grid.className = 'card-grid-75';

  // Headers
  const letters = ['B','I','N','G','O'];
  const hClasses = ['h-b','h-i','h-n','h-g','h-o'];
  letters.forEach((l, i) => {
    const h = document.createElement('div');
    h.className = `card-header ${hClasses[i]}`;
    h.textContent = l;
    grid.appendChild(h);
  });

  // 5 rows
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < 5; col++) {
      const cell = document.createElement('div');
      cell.className = 'card-cell';
      if (col === 2 && row === 2) {
        cell.classList.add('free');
        cell.textContent = 'FREE';
      } else {
        cell.textContent = columns[col][row];
      }
      grid.appendChild(cell);
    }
  }

  card.appendChild(grid);
  return card;
}

// ══════════════════════════════════════════
// 90-BALL CARD GENERATION
// ══════════════════════════════════════════
function generate90Card() {
  // 3 rows, 9 columns
  // Each row has exactly 5 numbers and 4 blanks
  // Column 0: 1-9, Column 1: 10-19, ... Column 7: 70-79, Column 8: 80-90
  const colRanges = [
    [1,9],[10,19],[20,29],[30,39],[40,49],[50,59],[60,69],[70,79],[80,90]
  ];

  // Pick 1-3 numbers per column, total across all columns = 15 (5 per row)
  // Each column must have at least 1 number
  let card; // card[row][col] = number or null
  let attempts = 0;

  while (attempts < 200) {
    attempts++;
    card = [[null,null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null,null],
            [null,null,null,null,null,null,null,null,null]];

    // For each column, pick how many numbers (1, 2, or 3)
    // We need total = 15, with 9 columns, each having 1-3
    // Start with 1 each (=9), distribute remaining 6
    const counts = [1,1,1,1,1,1,1,1,1];
    let extra = 6;
    while (extra > 0) {
      const col = Math.floor(Math.random() * 9);
      if (counts[col] < 3) { counts[col]++; extra--; }
    }

    // For each column, pick which rows get numbers
    const colNumbers = colRanges.map(([lo, hi]) => {
      const pool = [];
      for (let i = lo; i <= hi; i++) pool.push(i);
      shuffle(pool);
      return pool;
    });

    let valid = true;
    for (let col = 0; col < 9; col++) {
      const rows = pickRows(counts[col]);
      const nums = colNumbers[col].slice(0, counts[col]).sort((a,b) => a - b);
      for (let i = 0; i < rows.length; i++) {
        card[rows[i]][col] = nums[i];
      }
    }

    // Check each row has exactly 5
    for (let r = 0; r < 3; r++) {
      const filled = card[r].filter(v => v !== null).length;
      if (filled !== 5) { valid = false; break; }
    }
    if (valid) break;
  }

  return card;
}

function pickRows(count) {
  const rows = [0, 1, 2];
  shuffle(rows);
  return rows.slice(0, count).sort();
}

function render90Card(card, id) {
  const el = document.createElement('div');
  el.className = 'bingo-card';

  el.innerHTML = `
    <div class="card-title" style="letter-spacing:4px;font-size:1.3rem;">BINGO</div>
    <div class="card-id">Card #${id}</div>
  `;

  const grid = document.createElement('div');
  grid.className = 'card-grid-90';

  for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 9; col++) {
      const cell = document.createElement('div');
      cell.className = 'card-cell';
      if (card[row][col] !== null) {
        cell.textContent = card[row][col];
      } else {
        cell.classList.add('blank');
      }
      grid.appendChild(cell);
    }
  }

  el.appendChild(grid);
  return el;
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ══════════════════════════════════════════
// GENERATE
// ══════════════════════════════════════════
function generate() {
  const type = parseInt(document.getElementById('gameType').value);
  const count = Math.min(60, Math.max(1, parseInt(document.getElementById('cardCount').value) || 6));
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';
  container.className = `cards-container type-${type}`;

  for (let i = 1; i <= count; i++) {
    if (type === 75) {
      const cols = generate75Card();
      container.appendChild(render75Card(cols, i));
    } else {
      const card = generate90Card();
      container.appendChild(render90Card(card, i));
    }
  }
}

document.getElementById('generateBtn').addEventListener('click', generate);
document.getElementById('printBtn').addEventListener('click', () => window.print());

// Generate initial set
generate();
</script>
</body>
</html>
